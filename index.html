<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Album</title>
  <link rel="stylesheet" href="app.css" />
  <link rel="manifest" href="manifest.webmanifest" />
</head>
<body>
  <main class="app" id="mainApp">
    <div class="app-shell">
      <header class="screen-header">
        <h1 class="screen-title-main" id="mainScreenTitle">Album</h1>
      </header>

      <section class="view active" id="albumsView">
        <section class="albums-row" id="albumsRow"></section>
      </section>

      <section class="view" id="searchView">
        <div class="search-box">
          <input
            id="searchInput"
            type="search"
            placeholder="Cerca album"
            autocomplete="off"
          />
        </div>
        <section class="albums-row" id="searchResultsRow"></section>
        <div class="search-results-empty" id="searchEmptyState" hidden>
          Nessun album trovato.
        </div>
      </section>

      <section class="view" id="addView">
        <div class="add-panel">
          <div class="add-preview" aria-hidden="true">
            <div class="add-circle">+</div>
          </div>

          <button class="add-main-btn" id="createAlbumBtn" type="button">
            <strong>Crea un nuovo album</strong>
            <span>
              Aggiunge un album alla raccolta mantenendo i tuoi colori e la numerazione ordinata.
            </span>
          </button>
        </div>
      </section>
    </div>

    <nav class="bottom-nav" aria-label="Navigazione principale">
      <div class="nav-side">
        <button class="nav-btn active" id="navAlbumsBtn" type="button" data-view="albums">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 4.5h9.5a2 2 0 0 1 2 2V20H8a2 2 0 0 0-2 2z"></path>
            <path d="M6 4.5a2 2 0 0 0-2 2V20"></path>
          </svg>
          <span>Album</span>
        </button>
      </div>

      <button class="nav-btn nav-btn-center" id="navAddBtn" type="button" data-view="add" aria-label="Aggiungi album">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
      </button>

      <div class="nav-side">
        <button class="nav-btn" id="navSearchBtn" type="button" data-view="search">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
          </svg>
          <span>Cerca</span>
        </button>
      </div>
    </nav>

    <div class="modal-backdrop" id="editModalBackdrop">
      <div class="modal" id="editModal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
        <h3 id="editModalTitle">Modifica album</h3>

        <div class="field">
          <label for="albumNameInput">Nome album</label>
          <input id="albumNameInput" type="text" placeholder="Nome album" />
        </div>

        <div class="field">
          <label>Colore libro</label>
          <div class="color-grid" id="colorGrid"></div>
          <div class="selected-color-preview" id="selectedColorPreview">
            <span class="selected-color-dot" id="selectedColorDot"></span>
            <span id="selectedColorText">Colore selezionato</span>
          </div>
        </div>

        <div class="field">
          <label for="albumPagesInput">Numero pagine</label>
          <input id="albumPagesInput" type="number" min="1" inputmode="numeric" placeholder="Es. 10" />
        </div>

        <div class="field">
          <label for="albumSlotsInput">Slot per pagina</label>
          <input id="albumSlotsInput" type="number" min="1" inputmode="numeric" placeholder="Es. 9" />
        </div>

        <div class="modal-actions">
          <button class="modal-btn secondary" id="cancelEditBtn" type="button">Annulla</button>
          <button class="modal-btn primary" id="saveEditBtn" type="button">Salva</button>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="contextMenuBackdrop">
      <div class="context-menu" id="contextMenu" role="dialog" aria-modal="true" aria-labelledby="contextMenuTitle">
        <div class="context-header" id="contextMenuTitle">Album</div>
        <button class="menu-btn" id="contextEditBtn" type="button">Modifica</button>
        <button class="menu-btn" id="contextRenameBtn" type="button">Rinomina</button>
        <button class="menu-btn danger" id="contextDeleteBtn" type="button">Elimina</button>
      </div>
    </div>
  </main>

  <section class="album-screen" id="albumScreen">
    <div class="screen-topbar">
      <button class="back-btn" id="backToAlbumsBtn" type="button" aria-label="Torna agli album">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
    </div>

    <div class="screen-card">
      <h1 class="screen-title" id="screenAlbumTitle">Album</h1>
      <p class="screen-subtitle" id="screenAlbumMeta">0 pagine • 0 slot totali</p>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
