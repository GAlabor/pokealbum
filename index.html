<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Album</title>
  <style>
    :root {
      --bg: #f6f6f7;
      --surface: #ffffff;
      --surface-soft: #f0f0f3;
      --text: #111111;
      --muted: #7a7a7a;
      --danger: #d80f0f;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --shadow-soft: 0 6px 18px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app,
    .album-screen {
      min-height: 100vh;
    }

    .app.hidden,
    .album-screen {
      display: none;
    }

    .album-screen.open {
      display: block;
      padding: calc(env(safe-area-inset-top) + 18px) 16px calc(env(safe-area-inset-bottom) + 24px);
    }

    .app-shell {
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top) + 22px) 20px calc(env(safe-area-inset-bottom) + 112px);
    }

    .screen-header {
      margin-bottom: 20px;
    }

    .screen-title-main {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .albums-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .album-card {
      position: relative;
      width: 100%;
      text-align: left;
    }

    .album-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 1.02;
      border-radius: 24px;
      background: transparent;
      box-shadow: none;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      overflow: visible;
      padding: 0;
      isolation: isolate;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .album-cover::after {
      display: none;
    }

    .book-icon {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 18px 26px 26px 18px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.24), transparent 28%),
        linear-gradient(135deg, color-mix(in srgb, var(--album-color, #4f7cff) 86%, #ffffff 14%), var(--album-color, #4f7cff));
      box-shadow:
        inset -10px 0 0 rgba(255, 255, 255, 0.16),
        inset 0 0 0 1px rgba(0, 0, 0, 0.05),
        inset 0 -34px 60px rgba(0, 0, 0, 0.16),
        0 16px 28px rgba(0, 0, 0, 0.18);
      filter: saturate(1.02);
      overflow: hidden;
    }

    .book-icon::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 0;
      width: 12px;
      height: 100%;
      border-radius: 12px 0 0 12px;
      background: rgba(0, 0, 0, 0.14);
      box-shadow: inset -1px 0 0 rgba(255,255,255,0.08);
    }

    .book-icon::after {
      content: "";
      position: absolute;
      right: 14px;
      top: 18px;
      width: 42px;
      height: calc(100% - 36px);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.14);
      pointer-events: none;
    }

    .album-info {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
      padding: 16px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.56) 0%, rgba(0, 0, 0, 0.16) 42%, rgba(0, 0, 0, 0) 100%);
      border-radius: 0 0 26px 18px;
    }

    .album-title {
      margin: 0;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.12;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.28);
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      word-break: break-word;
      max-width: 100%;
      padding-left: 0;
      margin-left: -8px;
      position: relative;
      z-index: 3;
    }

    .album-meta {
      margin: 0;
      min-width: 52px;
      height: 52px;
      padding: 0 10px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(88, 70, 51, 0.88);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      flex: 0 0 auto;
    }

    .search-box {
      position: relative;
      margin-bottom: 18px;
    }

    .search-box input {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow-soft);
      padding: 0 18px;
      font-size: 16px;
      outline: none;
    }

    .search-results-empty,
    .empty-add-state {
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(242,242,245,0.98));
      border-radius: 26px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .search-results-empty {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .add-panel {
      display: grid;
      gap: 18px;
    }

    .add-preview {
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #f2f2f6, #ececf1);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .add-circle {
      width: 88px;
      height: 88px;
      border: 0;
      border-radius: 50%;
      background: var(--danger);
      color: #fff;
      font-size: 54px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 16px 30px rgba(216, 15, 15, 0.26);
    }

    .add-main-btn {
      border: 0;
      border-radius: 20px;
      padding: 18px 20px;
      background: var(--surface);
      color: var(--text);
      text-align: left;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .add-main-btn strong {
      display: block;
      font-size: 20px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .add-main-btn span {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
    }

    .bottom-nav {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 30;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      padding: 16px 18px calc(env(safe-area-inset-bottom) + 12px);
      background: rgba(255, 255, 255, 0.96);
      border-radius: 34px;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .nav-side {
      display: flex;
      justify-content: center;
    }

    .nav-btn {
      border: 0;
      background: transparent;
      color: #8b8b8f;
      padding: 0;
      cursor: pointer;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      min-width: 72px;
    }

    .nav-btn svg {
      width: 27px;
      height: 27px;
      display: block;
      stroke: currentColor;
    }

    .nav-btn span {
      font-size: 13px;
      font-weight: 600;
    }

    .nav-btn.active {
      color: var(--danger);
    }

    .nav-btn-center {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      border: 8px solid var(--bg);
      margin-top: -42px;
      background: var(--danger);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 28px rgba(216, 15, 15, 0.28);
    }

    .nav-btn-center svg {
      width: 34px;
      height: 34px;
      stroke: currentColor;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.32);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      z-index: 50;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal,
    .context-menu {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
    }

    .modal {
      padding: 18px;
    }

    .modal h3 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid #e5e5e7;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      background: #fff;
    }

    .color-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .color-option,
    .color-picker-trigger {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      padding: 0;
      flex: 0 0 auto;
      position: relative;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    }

    .color-option:hover,
    .color-picker-trigger:hover {
      transform: scale(1.06);
    }

    .color-option.selected,
    .color-picker-trigger.selected {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.08), 0 6px 14px rgba(0, 0, 0, 0.12);
    }

    .color-picker-trigger {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: conic-gradient(#ff4d4d, #ffb84d, #ffe14d, #6bd66b, #4dc3ff, #726bff, #c96bff, #ff6bc1, #ff4d4d);
      color: #111;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .color-picker-trigger span {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      line-height: 1;
    }

    .hidden-color-input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .selected-color-preview {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      background: #f4f4f6;
      padding: 8px 10px;
      border-radius: 999px;
    }

    .selected-color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: var(--selected-color, #4f7cff);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .modal-btn {
      flex: 1;
      border: 0;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .modal-btn.secondary {
      background: #f1f1f3;
      color: #111;
    }

    .modal-btn.primary {
      background: #111;
      color: #fff;
    }

    .context-menu {
      padding: 10px;
    }

    .context-header {
      padding: 10px 12px 8px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .menu-btn {
      width: 100%;
      border: 0;
      background: #fff;
      border-radius: 16px;
      padding: 14px 16px;
      text-align: left;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .menu-btn:hover,
    .menu-btn:active {
      background: #f4f4f6;
    }

    .menu-btn.danger {
      color: #c62828;
    }

    .screen-topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding-bottom: 16px;
      background: linear-gradient(to bottom, var(--bg) 85%, rgba(246, 246, 247, 0));
    }

    .back-btn {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      background: rgba(255, 255, 255, 0.92);
      color: #111111;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.10);
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .back-btn:hover,
    .back-btn:active {
      transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.14);
      background: rgba(255, 255, 255, 0.98);
    }

    .back-btn svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .screen-card {
      background: #fff;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
    }

    .screen-title {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.15;
      margin: 0 0 12px;
    }

    .screen-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="app" id="mainApp">
    <div class="app-shell">
      <header class="screen-header">
        <h1 class="screen-title-main" id="mainScreenTitle">Album</h1>
      </header>

      <section class="view active" id="albumsView">
        <section class="albums-row" id="albumsRow"></section>
      </section>

      <section class="view" id="searchView">
        <div class="search-box">
          <input id="searchInput" type="search" placeholder="Cerca album" autocomplete="off" />
        </div>
        <section class="albums-row" id="searchResultsRow"></section>
        <div class="search-results-empty" id="searchEmptyState" hidden>Nessun album trovato. Naturalmente bastava cambiare due lettere e spariva tutto.</div>
      </section>

      <section class="view" id="addView">
        <div class="add-panel">
          <div class="add-preview">
            <div class="add-circle">+</div>
          </div>
          <button class="add-main-btn" id="createAlbumBtn" type="button">
            <strong>Crea un nuovo album</strong>
            <span>Aggiunge un album alla raccolta mantenendo i tuoi colori e la numerazione ordinata.</span>
          </button>
        </div>
      </section>
    </div>

    <nav class="bottom-nav" aria-label="Navigazione principale">
      <div class="nav-side">
        <button class="nav-btn active" id="navAlbumsBtn" type="button" data-view="albums">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 4.5h9.5a2 2 0 0 1 2 2V20H8a2 2 0 0 0-2 2z"></path>
            <path d="M6 4.5a2 2 0 0 0-2 2V20"></path>
          </svg>
          <span>Album</span>
        </button>
      </div>

      <button class="nav-btn nav-btn-center" id="navAddBtn" type="button" data-view="add" aria-label="Aggiungi">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
      </button>

      <div class="nav-side">
        <button class="nav-btn" id="navSearchBtn" type="button" data-view="search">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
          </svg>
          <span>Cerca</span>
        </button>
      </div>
    </nav>

    <div class="modal-backdrop" id="editModalBackdrop">
      <div class="modal" id="editModal">
        <h3>Modifica album</h3>

        <div class="field">
          <label for="albumNameInput">Nome album</label>
          <input id="albumNameInput" type="text" placeholder="Nome album" />
        </div>

        <div class="field">
          <label>Colore libro</label>
          <div class="color-grid" id="colorGrid"></div>
          <div class="selected-color-preview" id="selectedColorPreview">
            <span class="selected-color-dot" id="selectedColorDot"></span>
            <span id="selectedColorText">Colore selezionato</span>
          </div>
        </div>

        <div class="field">
          <label for="albumPagesInput">Numero pagine</label>
          <input id="albumPagesInput" type="number" min="1" inputmode="numeric" placeholder="Es. 10" />
        </div>

        <div class="field">
          <label for="albumSlotsInput">Slot per pagina</label>
          <input id="albumSlotsInput" type="number" min="1" inputmode="numeric" placeholder="Es. 9" />
        </div>

        <div class="modal-actions">
          <button class="modal-btn secondary" id="cancelEditBtn">Annulla</button>
          <button class="modal-btn primary" id="saveEditBtn">Salva</button>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="contextMenuBackdrop">
      <div class="context-menu" id="contextMenu">
        <div class="context-header" id="contextMenuTitle">Album</div>
        <button class="menu-btn" id="contextEditBtn" type="button">Modifica</button>
        <button class="menu-btn" id="contextRenameBtn" type="button">Rinomina</button>
        <button class="menu-btn danger" id="contextDeleteBtn" type="button">Elimina</button>
      </div>
    </div>
  </main>

  <section class="album-screen" id="albumScreen">
    <div class="screen-topbar">
      <button class="back-btn" id="backToAlbumsBtn" type="button" aria-label="Torna agli album">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
    </div>

    <div class="screen-card">
      <h1 class="screen-title" id="screenAlbumTitle">Album</h1>
      <p class="screen-subtitle" id="screenAlbumMeta">0 pagine • 0 slot totali</p>
    </div>
  </section>

  <script>
    const mainApp = document.getElementById('mainApp');
    const albumScreen = document.getElementById('albumScreen');
    const albumsRow = document.getElementById('albumsRow');
    const searchResultsRow = document.getElementById('searchResultsRow');
    const searchEmptyState = document.getElementById('searchEmptyState');
    const searchInput = document.getElementById('searchInput');
    const editModalBackdrop = document.getElementById('editModalBackdrop');
    const editModal = document.getElementById('editModal');
    const albumNameInput = document.getElementById('albumNameInput');
    const albumPagesInput = document.getElementById('albumPagesInput');
    const albumSlotsInput = document.getElementById('albumSlotsInput');
    const colorGrid = document.getElementById('colorGrid');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const saveEditBtn = document.getElementById('saveEditBtn');
    const selectedColorDot = document.getElementById('selectedColorDot');
    const selectedColorText = document.getElementById('selectedColorText');
    const contextMenuBackdrop = document.getElementById('contextMenuBackdrop');
    const contextMenu = document.getElementById('contextMenu');
    const contextMenuTitle = document.getElementById('contextMenuTitle');
    const contextEditBtn = document.getElementById('contextEditBtn');
    const contextRenameBtn = document.getElementById('contextRenameBtn');
    const contextDeleteBtn = document.getElementById('contextDeleteBtn');
    const backToAlbumsBtn = document.getElementById('backToAlbumsBtn');
    const screenAlbumTitle = document.getElementById('screenAlbumTitle');
    const screenAlbumMeta = document.getElementById('screenAlbumMeta');
    const mainScreenTitle = document.getElementById('mainScreenTitle');
    const albumsView = document.getElementById('albumsView');
    const searchView = document.getElementById('searchView');
    const addView = document.getElementById('addView');
    const navAlbumsBtn = document.getElementById('navAlbumsBtn');
    const navAddBtn = document.getElementById('navAddBtn');
    const navSearchBtn = document.getElementById('navSearchBtn');
    const createAlbumBtn = document.getElementById('createAlbumBtn');

    const LONG_PRESS_MS = 500;
    const MOVE_TOLERANCE_PX = 12;

    let currentAlbumCard = null;
    let selectedColor = '#4f7cff';
    let isCustomColor = false;
    let contextAlbumCard = null;
    let openedAlbumCard = null;
    let activeView = 'albums';

    const presetColors = [
      { label: 'Blu', value: '#4f7cff' },
      { label: 'Rosso', value: '#ff5c5c' },
      { label: 'Verde', value: '#43b86b' },
      { label: 'Giallo', value: '#f6c744' },
      { label: 'Viola', value: '#8c6cff' },
      { label: 'Arancione', value: '#ff944d' },
      { label: 'Rosa', value: '#ff78b2' },
      { label: 'Grigio', value: '#8f98a3' }
    ];

    function normalizeHexColor(color) {
      return color.trim().toLowerCase();
    }

    function isPresetColor(color) {
      return presetColors.some(({ value }) => normalizeHexColor(value) === normalizeHexColor(color));
    }

    function updateSelectedColorPreview() {
      selectedColorDot.style.background = selectedColor;
      selectedColorText.textContent = isCustomColor
        ? `Colore personalizzato: ${selectedColor.toUpperCase()}`
        : `Colore selezionato: ${selectedColor.toUpperCase()}`;
    }

    function renderColorGrid(activeColor) {
      colorGrid.innerHTML = '';
      const normalizedActive = normalizeHexColor(activeColor);

      presetColors.forEach(({ label, value }) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `color-option${normalizeHexColor(value) === normalizedActive ? ' selected' : ''}`;
        btn.style.background = value;
        btn.title = label;
        btn.setAttribute('aria-label', label);

        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          selectedColor = value;
          isCustomColor = false;
          renderColorGrid(selectedColor);
        });

        colorGrid.appendChild(btn);
      });

      const customWrap = document.createElement('div');
      customWrap.className = `color-picker-trigger${isCustomColor ? ' selected' : ''}`;
      customWrap.title = 'Scegli un colore personalizzato';
      customWrap.setAttribute('aria-label', 'Apri tavolozza colori');
      customWrap.setAttribute('role', 'button');
      customWrap.tabIndex = 0;
      customWrap.innerHTML = `
        <span>+</span>
        <input class="hidden-color-input" type="color" value="${selectedColor}" />
      `;

      const colorInput = customWrap.querySelector('input');

      function applyCustomColor(value, finalRender = false) {
        selectedColor = value;
        isCustomColor = !isPresetColor(selectedColor);
        updateSelectedColorPreview();

        if (finalRender) {
          renderColorGrid(selectedColor);
        }
      }

      function triggerColorPicker(e) {
        e.preventDefault();
        e.stopPropagation();
        colorInput.click();
      }

      customWrap.addEventListener('click', triggerColorPicker);
      customWrap.addEventListener('pointerdown', (e) => e.stopPropagation());
      customWrap.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
      customWrap.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          triggerColorPicker(e);
        }
      });

      colorInput.addEventListener('click', (e) => e.stopPropagation());
      colorInput.addEventListener('pointerdown', (e) => e.stopPropagation());
      colorInput.addEventListener('input', (e) => {
        e.stopPropagation();
        applyCustomColor(e.target.value);
      });
      colorInput.addEventListener('change', (e) => {
        e.stopPropagation();
        applyCustomColor(e.target.value, true);
      });

      colorGrid.appendChild(customWrap);
      updateSelectedColorPreview();
    }

    function refreshOpenedAlbumScreen() {
      if (!openedAlbumCard) return;

      const { name, pages, slots } = openedAlbumCard.albumData;
      screenAlbumTitle.textContent = name;
      screenAlbumMeta.textContent = `${pages} pagine • ${pages * slots} slot totali`;
    }

    function openAlbumScreen(card) {
      openedAlbumCard = card;
      refreshOpenedAlbumScreen();
      mainApp.classList.add('hidden');
      albumScreen.classList.add('open');
    }

    function closeAlbumScreen() {
      openedAlbumCard = null;
      albumScreen.classList.remove('open');
      mainApp.classList.remove('hidden');
    }

    function openEditModal(card) {
      currentAlbumCard = card;
      const { name, pages, slots, color } = card.albumData;

      albumNameInput.value = name;
      albumPagesInput.value = pages;
      albumSlotsInput.value = slots;
      selectedColor = color;
      isCustomColor = !isPresetColor(selectedColor);
      renderColorGrid(selectedColor);
      editModalBackdrop.classList.add('open');
    }

    function closeEditModal() {
      editModalBackdrop.classList.remove('open');
      currentAlbumCard = null;
    }

    function openContextMenu(card) {
      contextAlbumCard = card;
      contextMenuTitle.textContent = card.albumData.name;
      contextMenuBackdrop.classList.add('open');
    }

    function closeContextMenu() {
      contextMenuBackdrop.classList.remove('open');
      contextAlbumCard = null;
    }

    function getSourceCard(card) {
      return card.sourceCard || card;
    }

    function renameAlbum(card) {
      const sourceCard = getSourceCard(card);
      const newName = window.prompt('Nuovo nome album', sourceCard.albumData.name);
      const trimmedName = newName?.trim();
      if (!trimmedName) return;

      sourceCard.albumData.name = trimmedName;
      updateAlbumCard(sourceCard);
      renderSearchResults(searchInput.value);
    }

    function deleteAlbum(card) {
      const sourceCard = getSourceCard(card);
      if (openedAlbumCard === sourceCard || openedAlbumCard === card) {
        closeAlbumScreen();
      }
      sourceCard.remove();
      renderSearchResults(searchInput.value);
    }

    function updateAlbumCard(card) {
      const sourceCard = getSourceCard(card);
      const { name, color, pages, slots } = sourceCard.albumData;
      sourceCard.querySelector('.book-icon').style.setProperty('--album-color', color);
      sourceCard.querySelector('.album-title').textContent = name;
      sourceCard.querySelector('.album-meta').textContent = `0/${pages * slots}`;
      refreshOpenedAlbumScreen();
    }

    function attachAlbumInteractions(card) {
      const cover = card.querySelector('.album-cover');
      let pressTimer = null;
      let longPressTriggered = false;
      let pointerMoved = false;
      let startX = 0;
      let startY = 0;
      let activePointerId = null;

      function clearPressTimer() {
        if (!pressTimer) return;
        clearTimeout(pressTimer);
        pressTimer = null;
      }

      function resetPressState() {
        clearPressTimer();
        pointerMoved = false;
        activePointerId = null;
      }

      function startPress(e) {
        if (e.pointerType === 'mouse' && e.button !== 0) return;

        startX = e.clientX;
        startY = e.clientY;
        pointerMoved = false;
        longPressTriggered = false;
        activePointerId = e.pointerId;
        clearPressTimer();

        if (cover.setPointerCapture) {
          try {
            cover.setPointerCapture(e.pointerId);
          } catch (_) {}
        }

        pressTimer = setTimeout(() => {
          longPressTriggered = true;
          clearPressTimer();
          openContextMenu(card);
        }, LONG_PRESS_MS);
      }

      cover.addEventListener('pointerdown', startPress);

      cover.addEventListener('pointermove', (e) => {
        if (activePointerId !== e.pointerId || longPressTriggered) return;

        const deltaX = e.clientX - startX;
        const deltaY = e.clientY - startY;
        if (Math.hypot(deltaX, deltaY) <= MOVE_TOLERANCE_PX) return;

        pointerMoved = true;
        clearPressTimer();
      });

      cover.addEventListener('pointerup', (e) => {
        if (activePointerId !== e.pointerId) return;

        const shouldOpenAlbum = !longPressTriggered && !pointerMoved;

        if (cover.releasePointerCapture && cover.hasPointerCapture?.(e.pointerId)) {
          try {
            cover.releasePointerCapture(e.pointerId);
          } catch (_) {}
        }

        resetPressState();

        if (!shouldOpenAlbum) {
          e.preventDefault();
          return;
        }

        openAlbumScreen(card);
      });

      cover.addEventListener('pointercancel', (e) => {
        if (activePointerId === e.pointerId) {
          resetPressState();
        }
      });

      cover.addEventListener('pointerleave', (e) => {
        if (e.pointerType === 'mouse' && activePointerId === e.pointerId && !longPressTriggered) {
          resetPressState();
        }
      });

      cover.addEventListener('contextmenu', (e) => e.preventDefault());
    }

    function getNextAlbumNumber() {
      const usedNumbers = Array.from(albumsRow.querySelectorAll('.album-card'))
        .map((card) => {
          const match = card.albumData.name.match(/^Album\s+(\d+)$/i);
          return match ? Number(match[1]) : null;
        })
        .filter((number) => Number.isInteger(number) && number > 0)
        .sort((a, b) => a - b);

      let nextNumber = 1;
      for (const number of usedNumbers) {
        if (number > nextNumber) break;
        if (number === nextNumber) nextNumber++;
      }

      return nextNumber;
    }

    function createAlbum(openEditor = false) {
      const nextAlbumNumber = getNextAlbumNumber();
      const defaultColor = presetColors[(nextAlbumNumber - 1) % presetColors.length].value;
      const card = document.createElement('article');
      card.className = 'album-card';
      card.albumData = {
        name: `Album ${nextAlbumNumber}`,
        color: defaultColor,
        pages: 10,
        slots: 9
      };

      card.innerHTML = `
        <div class="album-cover">
          <div class="book-icon" style="--album-color:${card.albumData.color}"></div>
          <div class="album-info">
            <div class="album-title"></div>
            <div class="album-meta"></div>
          </div>
        </div>
      `;

      updateAlbumCard(card);
      attachAlbumInteractions(card);
      albumsRow.appendChild(card);
      renderSearchResults(searchInput.value);

      if (openEditor) {
        setActiveView('albums');
        openEditModal(card);
      }
    }

    function renderSearchResults(query = '') {
      const normalizedQuery = query.trim().toLowerCase();
      const cards = Array.from(albumsRow.querySelectorAll('.album-card'));

      searchResultsRow.innerHTML = '';

      const matches = cards.filter((card) => {
        if (!normalizedQuery) return true;
        const { name, pages, slots } = card.albumData;
        const searchableText = `${name} ${pages} ${slots}`.toLowerCase();
        return searchableText.includes(normalizedQuery);
      });

      matches.forEach((card) => {
        searchResultsRow.appendChild(card.cloneNode(true));
      });

      Array.from(searchResultsRow.children).forEach((clone, index) => {
        const originalCard = matches[index];
        clone.albumData = originalCard.albumData;
        clone.sourceCard = originalCard;
        attachAlbumInteractions(clone);
      });

      searchEmptyState.hidden = matches.length > 0;
    }

    function setActiveView(viewName) {
      activeView = viewName;
      albumsView.classList.toggle('active', viewName === 'albums');
      searchView.classList.toggle('active', viewName === 'search');
      addView.classList.toggle('active', viewName === 'add');

      navAlbumsBtn.classList.toggle('active', viewName === 'albums');
      navSearchBtn.classList.toggle('active', viewName === 'search');
      navAddBtn.classList.toggle('active', viewName === 'add');

      if (viewName === 'albums') {
        mainScreenTitle.textContent = 'Album';
      } else if (viewName === 'search') {
        mainScreenTitle.textContent = 'Cerca';
        renderSearchResults(searchInput.value);
      } else {
        mainScreenTitle.textContent = 'Aggiungi';
      }
    }

    backToAlbumsBtn.addEventListener('click', closeAlbumScreen);
    cancelEditBtn.addEventListener('click', closeEditModal);

    saveEditBtn.addEventListener('click', () => {
      if (!currentAlbumCard) return;

      currentAlbumCard.albumData.name = albumNameInput.value.trim() || currentAlbumCard.albumData.name;
      currentAlbumCard.albumData.color = selectedColor;
      currentAlbumCard.albumData.pages = Math.max(1, Number(albumPagesInput.value) || 1);
      currentAlbumCard.albumData.slots = Math.max(1, Number(albumSlotsInput.value) || 1);

      updateAlbumCard(currentAlbumCard);
      renderSearchResults(searchInput.value);
      closeEditModal();
    });

    contextEditBtn.addEventListener('click', () => {
      if (!contextAlbumCard) return;
      const targetCard = contextAlbumCard;
      closeContextMenu();
      openEditModal(targetCard);
    });

    contextRenameBtn.addEventListener('click', () => {
      if (!contextAlbumCard) return;
      const targetCard = contextAlbumCard;
      closeContextMenu();
      renameAlbum(targetCard);
    });

    contextDeleteBtn.addEventListener('click', () => {
      if (!contextAlbumCard) return;
      const targetCard = contextAlbumCard;
      closeContextMenu();
      deleteAlbum(targetCard);
    });

    editModalBackdrop.addEventListener('click', (e) => {
      if (e.target === editModalBackdrop) {
        closeEditModal();
      }
    });

    contextMenuBackdrop.addEventListener('click', (e) => {
      if (e.target === contextMenuBackdrop) {
        closeContextMenu();
      }
    });

    editModal.addEventListener('click', (e) => e.stopPropagation());
    contextMenu.addEventListener('click', (e) => e.stopPropagation());

    navAlbumsBtn.addEventListener('click', () => setActiveView('albums'));
    navSearchBtn.addEventListener('click', () => setActiveView('search'));
    navAddBtn.addEventListener('click', () => {
      createAlbum(false);
      setActiveView('albums');
    });
    createAlbumBtn.addEventListener('click', () => createAlbum(false));
    searchInput.addEventListener('input', (e) => renderSearchResults(e.target.value));

    createAlbum();
    createAlbum();
    createAlbum();
    renderSearchResults();
  </script>
</body>
</html>
