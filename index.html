<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>PokéAlbum Home</title>
    <style>
      :root {
        --bg1: #edf2fb;
        --bg2: #dfe9fb;
        --bg3: #dff4ff;
        --blue: #2f64ff;
        --blue2: #5d90ff;
        --text: #14254f;
        --muted: #7080a3;
        --panel: rgba(255, 255, 255, 0.54);
        --panel-stroke: rgba(255, 255, 255, 0.7);
        --shadow: 0 20px 50px rgba(64, 96, 170, 0.18);
        --safe-top: max(16px, env(safe-area-inset-top));
        --safe-bottom: max(16px, env(safe-area-inset-bottom));
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        max-width: 100%;
        height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
          "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        overflow: hidden;
        overflow-x: hidden;
        overscroll-behavior-x: none;
        touch-action: pan-y;
        background:
          radial-gradient(
            circle at 15% 88%,
            rgba(153, 170, 255, 0.28),
            transparent 26%
          ),
          radial-gradient(
            circle at 86% 14%,
            rgba(124, 214, 255, 0.38),
            transparent 23%
          ),
          radial-gradient(
            circle at 50% 55%,
            rgba(255, 255, 255, 0.78),
            transparent 30%
          ),
          linear-gradient(180deg, var(--bg2), var(--bg1) 55%, #e7eefb 100%);
      }
      body {
        min-height: 100svh;
        min-height: 100dvh;
        display: block;
        position: fixed;
        inset: 0;
        overflow: hidden;
        overflow-x: hidden;
      }
      .phone-stage {
        width: 100%;
        max-width: 100vw;
        height: 100%;
        display: block;
        padding: 0;
        overflow: hidden;
        overflow-x: hidden;
      }
      .screen {
        width: 100%;
        max-width: 100vw;
        height: 100dvh;
        min-height: 100svh;
        position: relative;
        overflow: hidden;
        overflow-x: hidden;
        overscroll-behavior-x: none;
        touch-action: pan-y;
        background:
          radial-gradient(
            circle at 18% 90%,
            rgba(154, 170, 255, 0.22),
            transparent 22%
          ),
          radial-gradient(
            circle at 85% 10%,
            rgba(126, 221, 255, 0.34),
            transparent 22%
          ),
          radial-gradient(
            circle at 50% 50%,
            rgba(255, 255, 255, 0.66),
            transparent 28%
          ),
          linear-gradient(
            180deg,
            rgba(241, 246, 255, 0.96),
            rgba(225, 234, 249, 0.95)
          );
        box-shadow: none;
      }
      .screen::before {
        content: "";
        position: absolute;
        inset: -14% -20%;
        background:
          radial-gradient(
            circle at 24% 22%,
            rgba(255, 255, 255, 0.82),
            transparent 16%
          ),
          radial-gradient(
            circle at 73% 71%,
            rgba(255, 255, 255, 0.4),
            transparent 19%
          );
        filter: blur(22px);
        pointer-events: none;
      }
      .content {
        position: relative;
        z-index: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: calc(var(--safe-top) + 10px) 20px
          calc(var(--safe-bottom) + 128px);
      }
      .content.is-form-open {
        padding-bottom: calc(var(--safe-bottom) + 20px);
      }
      .top-meta {
        flex: 0 0 auto;
        padding: 8px 8px 0;
        max-width: min(100%, 760px);
      }
      .eyebrow {
        margin: 0;
        display: flex;
        flex-wrap: nowrap;
        align-items: baseline;
        column-gap: 0.45em;
        row-gap: 0;
        font-size: clamp(14px, 1.25vw + 8px, 24px);
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #7f8fac;
        line-height: 1.16;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
        white-space: nowrap;
      }
      .eyebrow .label {
        color: #7f8fac;
        white-space: nowrap;
        flex: 0 0 auto;
      }
      .eyebrow .accent {
        display: inline-flex;
        align-items: baseline;
        position: relative;
        color: #3f6fe9;
        font-weight: 950;
        padding-bottom: 4px;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.55);
        white-space: nowrap;
        flex: 0 0 auto;
        max-width: none;
      }
      .name-edit-btn {
        appearance: none;
        -webkit-appearance: none;
        border: 0;
        background: transparent;
        font: inherit;
        letter-spacing: inherit;
        text-transform: inherit;
        cursor: pointer;
        padding-left: 0;
        padding-right: 0;
      }
      .name-edit-btn:focus-visible {
        outline: 2px solid rgba(47, 100, 255, 0.28);
        outline-offset: 4px;
        border-radius: 8px;
      }
      .eyebrow .accent::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 3px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(63, 111, 233, 0),
          rgba(63, 111, 233, 0.42) 50%,
          rgba(63, 111, 233, 0)
        );
        pointer-events: none;
      }
      .sub {
        margin: 0;
        font-size: clamp(14px, 0.52vw + 12px, 21px);
        font-weight: 350;
        letter-spacing: 0.002em;
        color: #7382a2;
        line-height: 1.24;
        -webkit-font-smoothing: antialiased;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
      }
      .sub strong {
        font-weight: 600;
        color: #7382a2;
      }
      .sub-wrap {
        margin: 9px 0 0;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }
      .price-value {
        transition: color 0.2s ease;
      }
      .price-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        padding: 0;
        border: 0;
        background: transparent;
        color: #8b98b6;
        cursor: pointer;
        border-radius: 999px;
        transition:
          background-color 0.18s ease,
          color 0.18s ease,
          transform 0.18s ease;
      }
      .price-toggle:hover {
        background: rgba(47, 100, 255, 0.08);
        color: #5c78c9;
      }
      .price-toggle:active {
        transform: scale(0.96);
      }
      .price-toggle:focus-visible {
        outline: 2px solid rgba(47, 100, 255, 0.28);
        outline-offset: 2px;
      }
      .eye-icon {
        width: 18px;
        height: 18px;
        display: block;
      }
      .eye-off {
        display: none;
      }
      .price-toggle.is-hidden .eye-open {
        display: none;
      }
      .price-toggle.is-hidden .eye-off {
        display: block;
      }
      .hero {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: clamp(12px, 2.2vh, 18px);
        padding: clamp(10px, 2vh, 18px) 8px 0;
      }
      .hero.is-hidden,
      .albums-view.is-hidden {
        display: none;
      }
      .album-wrap {
        position: relative;
        width: min(46vw, 190px);
        aspect-ratio: 1 / 1;
        margin-bottom: clamp(2px, 1vh, 8px);
        filter: drop-shadow(0 18px 22px rgba(57, 91, 176, 0.14));
      }
      .album {
        position: absolute;
        inset: 0;
        border-radius: 28px;
        background: linear-gradient(
          180deg,
          rgba(94, 133, 255, 0.95),
          rgba(42, 84, 233, 1)
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.35),
          inset 0 -14px 30px rgba(10, 30, 120, 0.12);
      }
      .album::before {
        content: "";
        position: absolute;
        left: 12%;
        top: 12%;
        width: 64%;
        height: 30%;
        border-radius: 20px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.30),
          rgba(255, 255, 255, 0.14)
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.32),
          0 8px 18px rgba(0, 0, 0, 0.08);
        backdrop-filter: blur(8px);
      }
      .album::after {
        content: "";
        position: absolute;
        right: 10%;
        top: 10%;
        bottom: 10%;
        width: 5.5%;
        border-radius: 20px;
        background: linear-gradient(
          180deg,
          rgba(30, 30, 30, 0.75),
          rgba(10, 10, 10, 0.9)
        );
        opacity: 0.9;
      }
      .plus-badge {
        position: absolute;
        right: -2%;
        bottom: -2%;
        width: 30%;
        aspect-ratio: 1;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(14px);
        box-shadow:
          0 12px 24px rgba(78, 110, 185, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        color: var(--blue);
        padding: 0;
      }
      .plus-badge::before,
      .plus-badge::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border-radius: 999px;
        background: currentColor;
      }
      .plus-badge::before {
        width: 38%;
        height: 2.5px;
      }
      .plus-badge::after {
        width: 2.5px;
        height: 38%;
      }
      h1 {
        margin: 0;
        max-width: 290px;
        font-size: clamp(30px, 5.2vh, 42px);
        line-height: 0.94;
        letter-spacing: -0.06em;
        font-weight: 950;
        color: #1c2e5a;
        text-wrap: balance;
      }
      .lead {
        margin: 0;
        max-width: 280px;
        font-size: clamp(16px, 2.3vh, 19px);
        line-height: 1.38;
        color: #6d7c9a;
        text-wrap: balance;
      }
      .cta {
        margin-top: clamp(4px, 0.9vh, 10px);
        border: 0;
        min-height: 62px;
        width: min(100%, 320px);
        border-radius: 999px;
        padding: 0 28px;
        font-size: clamp(18px, 2.7vh, 21px);
        font-weight: 900;
        letter-spacing: -0.03em;
        color: #fff;
        background: linear-gradient(
          135deg,
          #7aa6ff 0%,
          #4f83ff 38%,
          #2f64ff 100%
        );
        box-shadow:
          0 18px 36px rgba(52, 96, 220, 0.3),
          0 8px 16px rgba(79, 131, 255, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.34),
          inset 0 -10px 22px rgba(23, 52, 163, 0.18);
        cursor: pointer;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          filter 0.18s ease;
      }
      .cta:hover {
        transform: translateY(-1px);
        box-shadow:
          0 22px 40px rgba(52, 96, 220, 0.34),
          0 10px 18px rgba(79, 131, 255, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.34),
          inset 0 -10px 22px rgba(23, 52, 163, 0.18);
        filter: saturate(1.04);
      }
      .cta:active {
        transform: translateY(1px) scale(0.995);
      }
      .albums-view {
        flex: 1 1 auto;
        min-height: 0;
        margin-top: clamp(14px, 2vh, 22px);
        padding: clamp(24px, 3.2vh, 34px) 8px 0;
        overflow-y: auto;
        overflow-x: hidden;
        overscroll-behavior-x: none;
        -webkit-overflow-scrolling: touch;
        border-top: 1px solid rgba(108, 131, 190, 0.14);
      }
      .albums-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 190px));
        gap: 24px 18px;
        align-content: start;
        justify-content: center;
        justify-items: center;
      }
      .album-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: 100%;
      }
      .album-card .album-wrap {
        width: 100%;
        max-width: 190px;
        margin-bottom: 0;
        overflow: hidden;
        border-radius: 32px;
      }
      .album-info {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }
      .album-title {
        position: absolute;
        left: 14%;
        top: 14%;
        width: 60%;
        height: 26%;
        margin: 0;
        color: rgba(255, 255, 255, 0.96);
        font-size: var(--album-title-size, 16px);
        font-weight: 600;
        line-height: 1.08;
        transition: font-size 0.15s ease;
        letter-spacing: -0.03em;
        text-align: center;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.22);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        word-break: break-word;
        padding: 0 8px;
      }
      .album-meta {
        position: absolute;
        right: 16px;
        bottom: 16px;
        margin: 0;
        min-width: 42px;
        height: 32px;
        padding: 0 9px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        background: rgba(255, 255, 255, 0.18);
        color: #ffffff;
        font-size: 12px;
        font-weight: 650;
        line-height: 1;
        letter-spacing: -0.01em;
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      .album-name {
        display: none;
      }
      .bottom-nav-shell {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: calc(var(--safe-bottom) + 10px);
        z-index: 3;
        height: 80px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(24px) saturate(140%);
        box-shadow:
          0 16px 28px rgba(67, 83, 134, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.45);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: end;
        padding: 10px 18px 10px;
        max-width: none;
      }
      .bottom-nav-shell.is-hidden {
        display: none;
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        gap: 5px;
        color: #7f8fac;
        font-weight: 700;
        font-size: 13px;
        min-width: 72px;
      }
      .nav-item.active {
        color: var(--blue);
      }
      .nav-icon {
        width: 36px;
        height: 36px;
        display: block;
        opacity: 1;
        overflow: visible;
      }
      .fab-wrap {
        align-self: start;
        margin-top: -28px;
        padding: 8px;
        border-radius: 999px;
        background: rgba(243, 245, 251, 0.92);
        box-shadow: 0 12px 22px rgba(66, 92, 162, 0.12);
      }
      .fab {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        background: linear-gradient(180deg, #4d81ff, #2f64ff);
        box-shadow:
          0 12px 24px rgba(58, 101, 216, 0.26),
          inset 0 1px 0 rgba(255, 255, 255, 0.28);
        color: white;
        padding: 0;
        border: 0;
        cursor: pointer;
        transition:
          transform 0.16s ease,
          box-shadow 0.16s ease,
          filter 0.16s ease;
      }
      .fab:hover {
        filter: saturate(1.06);
      }
      .fab {
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        -webkit-user-select: none;
      }
      .fab:focus {
        outline: none;
      }
      .fab:focus-visible {
        outline: 2px solid rgba(47, 100, 255, 0.28);
        outline-offset: 4px;
      }
      .fab.is-touching {
        transform: scale(0.92);
        box-shadow:
          0 8px 16px rgba(58, 101, 216, 0.22),
          inset 0 2px 8px rgba(17, 42, 133, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.22);
      }
      .fab::before,
      .fab::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border-radius: 999px;
        background: currentColor;
      }
      .fab::before {
        width: 36%;
        height: 3px;
      }
      .fab::after {
        width: 3px;
        height: 36%;
      }
      .app-view {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      .app-view.is-hidden {
        display: none;
      }
      .add-album-view {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 8px 0 0;
      }
      .add-album-view.is-hidden {
        display: none;
      }
      .add-album-topbar {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 4px 0;
        margin-bottom: 6px;
        min-height: 44px;
      }
      .glass-icon-btn {
        width: 42px;
        height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.56);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.58);
        backdrop-filter: blur(20px) saturate(145%);
        box-shadow:
          0 12px 24px rgba(73, 96, 157, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.92);
        color: #5c6f99;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition:
          transform 0.18s ease,
          background-color 0.18s ease,
          color 0.18s ease,
          box-shadow 0.18s ease;
        padding: 0;
      }
      .glass-icon-btn:hover {
        transform: translateY(-1px);
        color: #3157c9;
        background: rgba(255, 255, 255, 0.68);
        box-shadow:
          0 16px 28px rgba(73, 96, 157, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.96);
      }
      .glass-icon-btn:active {
        transform: scale(0.97);
      }
      .glass-icon-btn:focus-visible {
        outline: 2px solid rgba(47, 100, 255, 0.24);
        outline-offset: 3px;
      }
      .glass-icon-btn svg {
        width: 18px;
        height: 18px;
        stroke-width: 2.2;
      }
      .glass-icon-btn.is-confirm {
        color: var(--blue);
      }
      .add-album-title-wrap {
        position: absolute;
        left: 56px;
        right: 56px;
        top: 50%;
        transform: translateY(-50%);
        padding: 0;
        text-align: center;
        pointer-events: none;
      }
      .add-album-title {
        margin: 0;
        font-size: clamp(18px, 2.3vh, 22px);
        line-height: 1.1;
        letter-spacing: -0.03em;
        font-weight: 850;
        color: #1c2e5a;
      }
      .add-album-subtitle {
        display: none;
      }
      .form-card {
        width: 100%;
        max-width: 420px;
        align-self: center;
        margin-top: 0;
        background: rgba(255, 255, 255, 0.52);
        border: 1px solid rgba(255, 255, 255, 0.62);
        border-radius: 30px;
        backdrop-filter: blur(24px) saturate(145%);
        box-shadow:
          0 24px 48px rgba(66, 89, 152, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        overflow: hidden;
        padding: 4px 0;
      }
      .form-row {
        padding: 14px 16px 12px;
        border-bottom: 1px solid rgba(111, 134, 188, 0.14);
      }
      .form-row:last-child {
        border-bottom: 0;
      }
      .form-label {
        display: block;
        margin: 0;
        font-size: 15px;
        font-weight: 850;
        letter-spacing: -0.02em;
        line-height: 1.05;
        color: #243865;
      }
      .form-help {
        margin: 2px 0 0;
        font-size: 12px;
        line-height: 1.2;
        font-weight: 500;
        color: #65779f;
      }
      .text-input,
      .number-input {
        width: 100%;
        min-height: 48px;
        border-radius: 18px;
        border: 1px solid rgba(120, 146, 207, 0.18);
        background: rgba(248, 251, 255, 0.9);
        padding: 0 16px;
        font-size: 15px;
        font-weight: 650;
        color: #20345f;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
        outline: none;
        transition:
          border-color 0.18s ease,
          box-shadow 0.18s ease,
          background-color 0.18s ease;
      }
      .text-input::placeholder,
      .number-input::placeholder {
        color: #9aa6bf;
      }
      .number-input {
        text-align: left;
      }
      .text-input:focus,
      .number-input:focus {
        border-color: rgba(47, 100, 255, 0.34);
        box-shadow:
          0 0 0 4px rgba(47, 100, 255, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        background: rgba(255, 255, 255, 0.96);
      }
      .color-picker-row {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 46px;
        overflow: visible;
        padding: 4px 0;
        width: 100%;
        min-width: 0;
        flex-wrap: nowrap;
      }
      .color-picker-row::-webkit-scrollbar {
        display: none;
      }
      .color-dot {
        -webkit-appearance: none;
        appearance: none;
        width: 28px;
        height: 28px;
        min-width: 28px;
        min-height: 28px;
        border-radius: 50%;
        border: 0;
        padding: 0;
        position: relative;
        cursor: pointer;
        flex: 0 0 28px;
        background-clip: padding-box;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.7),

          quickAddAlbumBtn: $("#quickAddAlbumBtn"),
          contextMenuBackdrop: $("#contextMenuBackdrop"),
          contextMenu: $("#contextMenu"),
          contextEditBtn: $("#contextEditBtn"),
          contextRenameBtn: $("#contextRenameBtn"),
          contextDeleteBtn: $("#contextDeleteBtn"),
        };

        const DEFAULT_ALBUM = Object.freeze({
          color: "#4f83ff",
          totalPages: 12,
          slotsPerPage: 9,
        });
        const LONG_PRESS_MS = 500;
        const MOVE_TOLERANCE_PX = 12;
        const visibleTotalPrice = els.totalPriceValue.textContent.trim();
        const hiddenTotalPrice = "€ ****";
        const OWNER_NAME_STORAGE_KEY = "pokealbumOwnerName";
        const defaultOwnerName = els.ownerNameBtn.textContent.trim();

        const state = {
          albumCount: 0,
          selectedColor: DEFAULT_ALBUM.color,
          isPriceHidden: false,
          contextAlbum: null,
          editingAlbum: null,
          contextOpenedAt: 0,
          lastContextActionAt: 0,
          press: null,
        };

        const stopEvent = (event) => {
          event.preventDefault();
          event.stopPropagation();
        };

        // Blocca zoom/pinch e gesti orizzontali della pagina.
        // Perché evidentemente anche una pagina HTML, lasciata sola, prova a scappare di lato.
        const preventPageZoom = (event) => {
          if (event.touches?.length > 1 || event.ctrlKey) event.preventDefault();
        };
        document.addEventListener("gesturestart", (event) => event.preventDefault(), { passive: false });
        document.addEventListener("gesturechange", (event) => event.preventDefault(), { passive: false });
        document.addEventListener("gestureend", (event) => event.preventDefault(), { passive: false });
        document.addEventListener("touchmove", preventPageZoom, { passive: false });
        document.addEventListener("wheel", preventPageZoom, { passive: false });


        const clearTextSelection = () => {
          try {
            window.getSelection?.().removeAllRanges();
          } catch {}
        };

        function toggleSelectionSuppressed(enabled) {
          document.documentElement.classList.toggle(
            "suppress-selection",
            enabled,
          );
          document.body?.classList.toggle("suppress-selection", enabled);
          if (enabled) clearTextSelection();
        }

        function clamp(value, min = 0, max = 255) {
          return Math.max(min, Math.min(max, value));
        }

        function hexToRgb(hex) {
          const normalized = hex.replace("#", "");
          const value =
            normalized.length === 3
              ? normalized
                  .split("")
                  .map((char) => char + char)
                  .join("")
              : normalized;
          const intValue = parseInt(value, 16);
          return {
            r: (intValue >> 16) & 255,
            g: (intValue >> 8) & 255,
            b: intValue & 255,
          };
        }

        function shadeColor(hex, amount) {
          const { r, g, b } = hexToRgb(hex);
          return `rgb(${clamp(r + amount)}, ${clamp(g + amount)}, ${clamp(b + amount)})`;
        }

        function getAlbumDataFromForm(fallbackName) {
          return {
            name: els.albumNameInput.value.trim() || fallbackName,
            color: state.selectedColor,
            totalPages: Math.max(1, Number(els.totalPagesInput.value) || 1),
            slotsPerPage: Math.max(1, Number(els.slotsPerPageInput.value) || 1),
          };
        }

        function getAlbumTitleFontSize(name) {
          const length = name.trim().length;
          if (length <= 8) return 18;
          if (length <= 12) return 16;
          if (length <= 18) return 14;
          if (length <= 26) return 12;
          if (length <= 34) return 10;
          return 9;
        }

        function fitAlbumTitle(albumNode) {
          const title = $(".album-title", albumNode);
          if (!title) return;

          let fontSize = getAlbumTitleFontSize(title.textContent || "");
          title.style.setProperty("--album-title-size", `${fontSize}px`);

          requestAnimationFrame(() => {
            let attempts = 0;
            while (
              attempts < 12 &&
              fontSize > 8 &&
              (title.scrollWidth > title.clientWidth ||
                title.scrollHeight > title.clientHeight)
            ) {
              fontSize -= 1;
              title.style.setProperty("--album-title-size", `${fontSize}px`);
              attempts += 1;
            }
          });
        }

        function renderAlbum(albumNode) {
          const { name, color, totalPages, slotsPerPage } = albumNode.albumData;
          const totalSlots = totalPages * slotsPerPage;
          $(".album-name", albumNode).textContent = name;
          $(".album-title", albumNode).textContent = name;
          fitAlbumTitle(albumNode);
          $(".album-meta", albumNode).textContent = `0/${totalSlots}`;
          $("[data-album-cover]", albumNode).style.cssText =
            `--album-color-light:${shadeColor(color, 26)};--album-color-dark:${shadeColor(color, -18)}`;
          albumNode.title = `${totalPages} pagine · ${totalSlots} slot totali`;
        }

        function createAlbumNode(data) {
          const node =
            els.albumTemplate.content.firstElementChild.cloneNode(true);
          node.albumData = data;
          renderAlbum(node);
          return node;
        }

        function syncEmptyState() {
          const hasAlbums = els.albumsGrid.children.length > 0;
          els.emptyState.classList.toggle("is-hidden", hasAlbums);
          els.albumsView.classList.toggle("is-hidden", !hasAlbums);
        }

        function setView(view) {
          const isForm = view === "form";
          els.homeView.classList.toggle("is-hidden", isForm);
          els.addAlbumView.classList.toggle("is-hidden", !isForm);
          els.bottomNav.classList.toggle("is-hidden", isForm);
          els.content.classList.toggle("is-form-open", isForm);
        }

        function setSelectedColor(color, triggerButton = null) {
          state.selectedColor = color;
          els.albumColorInput.value = color;
          $$(".color-dot", els.colorPickerRow).forEach((button) =>
            button.classList.remove("is-selected"),
          );
          (
            triggerButton ||
            $(`[data-color="${color}"]`, els.colorPickerRow) ||
            els.paletteColorBtn
          ).classList.add("is-selected");
        }

        function resetFormDefaults() {
          state.editingAlbum = null;
          els.albumNameInput.value = "";
          els.totalPagesInput.value = DEFAULT_ALBUM.totalPages;
          els.slotsPerPageInput.value = DEFAULT_ALBUM.slotsPerPage;
          setSelectedColor(
            DEFAULT_ALBUM.color,
            $(`[data-color="${DEFAULT_ALBUM.color}"]`, els.colorPickerRow),
          );
        }

        function fillFormFromAlbum(albumNode) {
          const { name, color, totalPages, slotsPerPage } = albumNode.albumData;
          state.editingAlbum = albumNode;
          els.albumNameInput.value = name;
          els.totalPagesInput.value = totalPages;
          els.slotsPerPageInput.value = slotsPerPage;
          setSelectedColor(color);
        }

        function openAlbumForm(albumNode = null) {
          els.addAlbumTitle.textContent = albumNode
            ? "Modifica album"
            : "Aggiungi album";
          albumNode ? fillFormFromAlbum(albumNode) : resetFormDefaults();
          setView("form");
        }

        function closeAlbumForm() {
          resetFormDefaults();
          setView("home");
        }

        function saveAlbum() {
          if (state.editingAlbum) {
            Object.assign(
              state.editingAlbum.albumData,
              getAlbumDataFromForm(state.editingAlbum.albumData.name),
            );
            renderAlbum(state.editingAlbum);
            closeAlbumForm();
            return;
          }

          state.albumCount += 1;
          els.albumsGrid.appendChild(
            createAlbumNode(getAlbumDataFromForm(`Album ${state.albumCount}`)),
          );
          syncEmptyState();
          closeAlbumForm();
        }

        function updatePriceVisibility() {
          const hidden = state.isPriceHidden;
          els.totalPriceValue.textContent = hidden
            ? hiddenTotalPrice
            : visibleTotalPrice;
          els.priceToggleBtn.classList.toggle("is-hidden", hidden);
          els.priceToggleBtn.setAttribute("aria-pressed", String(hidden));
          els.priceToggleBtn.setAttribute(
            "aria-label",
            hidden ? "Mostra totale" : "Nascondi totale",
          );
          els.priceToggleBtn.setAttribute(
            "title",
            hidden ? "Mostra totale" : "Nascondi totale",
          );
        }

        function setOwnerName(name) {
          const cleanName = name.trim() || defaultOwnerName;
          els.ownerNameBtn.textContent = cleanName;
          els.ownerNameBtn.setAttribute(
            "aria-label",
            `Modifica nome proprietario: ${cleanName}`,
          );
          try {
            localStorage.setItem(OWNER_NAME_STORAGE_KEY, cleanName);
          } catch {}
        }

        function loadOwnerName() {
          try {
            setOwnerName(localStorage.getItem(OWNER_NAME_STORAGE_KEY) || defaultOwnerName);
          } catch {
            setOwnerName(defaultOwnerName);
          }
        }

        function editOwnerName() {
          const currentName = els.ownerNameBtn.textContent.trim();
          const name = window.prompt("Inserisci il tuo nome", currentName)?.trim();
          if (!name) return;
          setOwnerName(name);
        }

        function positionContextMenu(albumNode) {
          const rect = $(".album-wrap", albumNode).getBoundingClientRect();
          const gap = 10;
          const margin = 12;

          els.contextMenu.style.left = "0px";
          els.contextMenu.style.top = "0px";
          const menuRect = els.contextMenu.getBoundingClientRect();

          const safeLeft = window.innerWidth - menuRect.width - margin;
          const safeTop = window.innerHeight - menuRect.height - margin;
          const preferredLeft = rect.left + rect.width / 2 - menuRect.width / 2;
          const preferredTop = rect.top - menuRect.height - gap;

          els.contextMenu.style.left = `${Math.max(margin, Math.min(preferredLeft, safeLeft))}px`;
          els.contextMenu.style.top = `${Math.max(margin, Math.min(preferredTop < margin ? rect.bottom + gap : preferredTop, safeTop))}px`;
        }

        function openContextMenu(albumNode) {
          state.contextAlbum = albumNode;
          state.contextOpenedAt = performance.now();
          els.contextMenuBackdrop.classList.add("open");
          positionContextMenu(albumNode);
        }

        function closeContextMenu() {
          state.contextAlbum = null;
          state.contextOpenedAt = 0;
          els.contextMenuBackdrop.classList.remove("open");
          toggleSelectionSuppressed(false);
          clearTextSelection();
        }

        function runContextAction(action) {
          return (event) => {
            stopEvent(event);
            const now = performance.now();
            if (!state.contextAlbum || now - state.lastContextActionAt < 250)
              return;
            state.lastContextActionAt = now;
            const albumNode = state.contextAlbum;
            closeContextMenu();
            action(albumNode);
          };
        }

        const contextActions = {
          edit: openAlbumForm,
          rename(albumNode) {
            const name = window
              .prompt("Nuovo nome album", albumNode.albumData.name)
              ?.trim();
            if (!name) return;
            albumNode.albumData.name = name;
            renderAlbum(albumNode);
          },
          delete(albumNode) {
            albumNode.remove();
            if (state.editingAlbum === albumNode) state.editingAlbum = null;
            syncEmptyState();
          },
        };

        function albumFromEvent(event) {
          return event.target.closest(".album-card");
        }

        function resetPressState(forceSelection = false) {
          const press = state.press;
          if (!press) return;
          clearTimeout(press.timer);
          press.albumNode.classList.remove("is-pressed");
          if (
            !forceSelection &&
            !els.contextMenuBackdrop.classList.contains("open")
          )
            toggleSelectionSuppressed(false);
          state.press = null;
        }

        on(els.albumsGrid, "pointerdown", (event) => {
          const cover = event.target.closest(".album-wrap");
          const albumNode = albumFromEvent(event);
          if (
            !cover ||
            !albumNode ||
            (event.pointerType === "mouse" && event.button !== 0)
          )
            return;

          resetPressState(true);
          state.press = {
            albumNode,
            cover,
            pointerId: event.pointerId,
            startX: event.clientX,
            startY: event.clientY,
            moved: false,
            triggered: false,
            timer: setTimeout(() => {
              if (!state.press) return;
              state.press.triggered = true;
              toggleSelectionSuppressed(true);
              clearTextSelection();
              openContextMenu(albumNode);
            }, LONG_PRESS_MS),
          };

          albumNode.classList.add("is-pressed");
          toggleSelectionSuppressed(true);
          clearTextSelection();
          try {
            cover.setPointerCapture?.(event.pointerId);
          } catch {}
        });

        on(els.albumsGrid, "pointermove", (event) => {
          const press = state.press;
          if (!press || press.pointerId !== event.pointerId || press.triggered)
            return;
          if (
            Math.hypot(
              event.clientX - press.startX,
              event.clientY - press.startY,
            ) <= MOVE_TOLERANCE_PX
          )
            return;
          press.moved = true;
          clearTimeout(press.timer);
          press.timer = 0;
        });

        on(
          els.albumsGrid,
          "pointerup pointercancel lostpointercapture",
          (event) => {
            const press = state.press;
            if (
              !press ||
              (event.pointerId && press.pointerId !== event.pointerId)
            )
              return;
            try {
              if (press.cover.hasPointerCapture?.(event.pointerId))
                press.cover.releasePointerCapture?.(event.pointerId);
            } catch {}
            const blockClick = press.triggered || press.moved;
            resetPressState();
            if (blockClick) {
              event.preventDefault();
              clearTextSelection();
            }
          },
        );

        els.albumsGrid.addEventListener("pointerleave", (event) => {
          const press = state.press;
          if (
            event.pointerType === "mouse" &&
            press?.pointerId === event.pointerId &&
            !press.triggered
          )
            resetPressState();
        });

        on(
          els.albumsGrid,
          "touchstart",
          () => {
            toggleSelectionSuppressed(true);
            clearTextSelection();
          },
          { passive: true },
        );
        on(
          els.albumsGrid,
          "touchend",
          () => {
            if (!els.contextMenuBackdrop.classList.contains("open"))
              toggleSelectionSuppressed(false);
            clearTextSelection();
          },
          { passive: true },
        );
        on(
          els.albumsGrid,
          "contextmenu selectstart dragstart",
          (event) =>
            event.target.closest(".album-wrap") && event.preventDefault(),
        );

        els.colorPickerRow.addEventListener("click", (event) => {
          const button = event.target.closest(".color-dot");
          if (!button) return;
          if (button === els.paletteColorBtn)
            return els.albumColorInput.click();
          if (button.dataset.color)
            setSelectedColor(button.dataset.color, button);
        });

        els.albumColorInput.addEventListener("input", () =>
          setSelectedColor(els.albumColorInput.value, els.paletteColorBtn),
        );
        function setFabPressed(isPressed) {
          els.addAlbumBtn.classList.toggle("is-touching", isPressed);
        }

        els.addAlbumBtn.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          setFabPressed(true);
          try {
            els.addAlbumBtn.setPointerCapture?.(event.pointerId);
          } catch {}
        });
        on(els.addAlbumBtn, "pointerup pointercancel lostpointercapture pointerleave", () => {
          setFabPressed(false);
          els.addAlbumBtn.blur();
        });
        els.addAlbumBtn.addEventListener("click", (event) => {
          event.preventDefault();
          els.addAlbumBtn.blur();
        });
        els.createFirstAlbumBtn.addEventListener("click", () =>
          openAlbumForm(),
        );
        els.quickAddAlbumBtn?.addEventListener("click", () => openAlbumForm());
        $$(".quick-actions .qa-btn").forEach((button) => {
          if (button.classList.contains("qa-add")) return;
          button.addEventListener("click", () => {
            $$(".quick-actions .qa-btn").forEach((item) => {
              if (item.classList.contains("qa-add")) return;
              item.classList.toggle("active", item === button);
              item.setAttribute("aria-pressed", String(item === button));
            });
          });
        });
        els.closeAddAlbumBtn.addEventListener("click", closeAlbumForm);
        els.saveAlbumBtn.addEventListener("click", saveAlbum);
        els.priceToggleBtn.addEventListener("click", () => {
          state.isPriceHidden = !state.isPriceHidden;
          updatePriceVisibility();
        });
        els.ownerNameBtn.addEventListener("click", editOwnerName);

        els.contextMenu.addEventListener("click", (event) =>
          event.stopPropagation(),
        );
        on(
          els.contextEditBtn,
          "pointerup click",
          runContextAction(contextActions.edit),
        );
        on(
          els.contextRenameBtn,
          "pointerup click",
          runContextAction(contextActions.rename),
        );
        on(
          els.contextDeleteBtn,
          "pointerup click",
          runContextAction(contextActions.delete),
        );
        on(els.contextMenuBackdrop, "pointerup click", (event) => {
          if (event.target !== els.contextMenuBackdrop) return;
          if (performance.now() - state.contextOpenedAt < 320)
            return stopEvent(event);
          closeContextMenu();
        });

        loadOwnerName();
        updatePriceVisibility();
        resetFormDefaults();
        syncEmptyState();
      })();
    </script>
  </body>
</html>
